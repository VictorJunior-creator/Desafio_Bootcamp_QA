name: Python Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Comando alterado para gerar o arquivo HTML automaticamente
      - name: Run tests
        run: |
          pytest --html=relatorio.html --self-contained-html

      # Novo passo adicionado para disponibilizar o relatório para download no GitHub
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always() # Garante o upload mesmo se algum teste falhar
        with:
          name: relatorio-de-testes
          path: relatorio.html
