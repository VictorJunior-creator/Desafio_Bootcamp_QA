[pytest]
# Diretório raiz dos testes
testpaths = tests

# Exibe logs de nível WARNING ou acima durante a execução
log_cli = true
log_cli_level = WARNING

# Formato da saída de log
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S

# Marcadores customizados (evita warnings de marcador desconhecido)
markers =
    usuarios: testes do endpoint /usuarios
    login: testes do endpoint /login
    produtos: testes do endpoint /produtos

# Opções padrão: short traceback + cobertura das camadas de código do projeto
addopts = --tb=short --cov=api --cov=fixtures --cov=schemas --cov=utils --cov-report=term-missing
